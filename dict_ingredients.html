<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성분 사전 | SkinLog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        header { background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #2ecc71; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 5%; }
        
        /* 검색 및 필터 영역 */
        .search-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 30px; text-align: center; }
        .search-section h2 { color: #2c3e50; margin-bottom: 15px; }
        .search-box { width: 100%; max-width: 500px; padding: 12px 20px; border: 2px solid #2ecc71; border-radius: 25px; font-size: 1rem; outline: none; transition: 0.3s; margin-bottom: 15px; }
        .search-box:focus { box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        
        .filter-btns button { background: #f1f2f6; border: none; padding: 8px 15px; margin: 0 5px; border-radius: 20px; cursor: pointer; color: #666; font-weight: bold; transition: 0.2s; }
        .filter-btns button.active { background: #2ecc71; color: white; }
        .filter-btns button:hover { background: #e0e0e0; }

        /* 성분 리스트 영역 */
        .ingredient-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (max-width: 768px) { .ingredient-grid { grid-template-columns: 1fr; } }

        .ing-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #2ecc71; transition: 0.3s; }
        .ing-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        .ing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ing-title { font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
        .ing-eng { font-size: 0.85rem; color: #95a5a6; }
        
        .ing-desc { font-size: 0.95rem; color: #555; margin-bottom: 15px; }
        
        /* 추천/비추천 배지 */
        .badge-area { display: flex; gap: 10px; font-size: 0.85rem; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 12px; font-weight: bold; }
        .badge.good { background: #eafaf1; color: #27ae60; }
        .badge.bad { background: #fceceb; color: #e74c3c; }

        .no-result { text-align: center; grid-column: 1 / -1; padding: 50px; color: #999; }
    </style>
</head>
<body>

<header>
    <div class="logo">SkinLog</div>
    <a href="index.html" style="font-weight: bold; color: #666;">메인으로 가기</a>
</header>

<div class="container">
    <div class="search-section">
        <h2>🔍 화장품 성분 사전</h2>
        <p style="margin-bottom: 20px; color: #666;">내 피부에 맞는 성분과 피해야 할 성분을 확인하세요.</p>
        
        <input type="text" id="searchInput" class="search-box" placeholder="성분명이나 효과(예: 진정, 미백)를 검색해보세요" onkeyup="filterIngredients()">
        
        <div class="filter-btns" id="filterContainer">
            <button class="active" onclick="setFilter('all', this)">전체보기</button>
            <button onclick="setFilter('지성', this)">지성 추천</button>
            <button onclick="setFilter('건성', this)">건성 추천</button>
            <button onclick="setFilter('민감성', this)">민감성 추천</button>
            <button onclick="setFilter('수부지', this)">수부지 추천</button>
        </div>
    </div>

    <div class="ingredient-grid" id="ingredient-display">
        <!-- 자바스크립트가 성분 데이터를 여기에 그려줍니다 -->
    </div>
</div>

            goodFor: ["민감성", "지성"],

            goodFor: ["지성", "여드름성"],
            badFor: ["민감성", "극건성"],
            keyword: "각질 각질제거 블랙헤드 바하 BHA 여드름 피지"
        },
        {

            goodFor: ["건성", "민감성"],
            badFor: [],

        },
        {

            goodFor: ["건성", "민감성"],

            goodFor: ["건성", "극건성"],

        },

            goodFor: ["건성", "모든피부"],
            badFor: ["민감성"],
            keyword: "각질 각질제거 아하 AHA 피부결"
        },
        {
            name: "어성초 추출물",
            eng: "Houttuynia Cordata Extract",
            desc: "피부 열을 내리고 염증을 가라앉히는 데 탁월합니다. 최근 좁쌀 여드름과 붉은기 진정템으로 가장 사랑받는 성분입니다.",
            goodFor: ["수부지", "민감성", "여드름성"],
            badFor: [],
            keyword: "진정 어성초 좁쌀 붉은기 홍조 열감"
        },
        {
            name: "순수 비타민 C",
            eng: "Ascorbic Acid",
            desc: "강력한 항산화 효과로 칙칙한 피부 톤을 맑게 해주고 기미와 잡티를 옅게 만들어줍니다. 산성이라 따가울 수 있습니다.",
            goodFor: ["색소침착", "노화피부"],
            badFor: ["민감성", "여드름진행중"],
            keyword: "미백 비타민 잡티 기미 항산화 아스코빅"
        },
        {
            name: "스쿠알란",
            eng: "Squalane",
            desc: "피부 천연 피지와 유사한 구조를 가진 보습 오일. 모공을 막지 않고 산뜻하게 흡수되어 수부지와 지성도 쓸 수 있습니다.",
            goodFor: ["수부지", "건성", "민감성"],
            badFor: [],
            keyword: "보습 수분 오일 수부지 속건조"
        },
        {
            name: "알란토인",
            eng: "Allantoin",
            desc: "컴프리 식물에서 추출한 성분으로, 각질을 부드럽게 녹이고 상처 난 피부를 진정시키고 보호하는 기능이 뛰어납니다.",
            goodFor: ["민감성", "건성"],
            badFor: [],
            keyword: "진정 보호 상처 각질 보습"
        },
        {
            name: "프로폴리스",
            eng: "Propolis Extract",
            desc: "벌집에서 추출한 성분. 천연 항균 효과로 트러블을 예방하고, 피부에 영양을 공급해 특유의 '꿀광'을 만들어 줍니다.",
            goodFor: ["건성", "여드름성"],
            badFor: ["지성"],
            keyword: "영양 꿀광 광채 항균 트러블"
        },
        {
            name: "펩타이드",
            eng: "Peptides",
            desc: "단백질의 기본 구성 요소. 콜라겐 합성을 자극해 피부 탄력을 높이고 주름을 예방하는 프리미엄 안티에이징 성분입니다.",
            goodFor: ["노화피부", "건성"],
            badFor: [],
            keyword: "주름 탄력 안티에이징 단백질 재생"
        },
        {
            name: "쑥 추출물",
            eng: "Artemisia Extract",
            desc: "비타민과 미네랄이 풍부해 피부 정화 작용을 돕고, 울긋불긋 올라온 트러블과 예민해진 피부를 빠르게 진정시킵니다.",
            goodFor: ["민감성", "수부지", "지성"],
            badFor: [],
            keyword: "진정 쑥 홍조 정화 붉은기"
        },
        {
            name: "바쿠치올",
            eng: "Bakuchiol",
            desc: "보골지 씨앗에서 추출한 식물성 성분. '식물성 레티놀'로 불리며, 자극 없이 레티놀과 유사한 주름 개선 효과를 냅니다.",
            goodFor: ["민감성", "노화피부"],
            badFor: [],
            keyword: "탄력 안티에이징 주름 레티놀대체 식물성"
        },
        {
            name: "PHA (파하)",
            eng: "Gluconolactone",
            desc: "AHA, BHA를 이은 차세대 각질 제거 성분. 입자가 커서 피부에 천천히 흡수되므로 민감한 피부도 물광 필링이 가능합니다.",
            goodFor: ["민감성", "건성", "수부지"],
            badFor: [],
            keyword: "각질 각질제거 파하 물광 저자극 필링"
        },
        {
            name: "아줄렌",
            eng: "Azulene",
            desc: "캐모마일에서 추출한 보라색 성분. 화상 치료 연고에 쓰일 만큼 강력한 소염 및 진정 효과가 있어 극민감성 피부에 좋습니다.",
            goodFor: ["민감성", "여드름성"],
            badFor: [],
            keyword: "진정 소염 홍조 극민감 보라색 캐모마일"
        }
    ];

    let currentFilter = 'all';

    // 화면에 성분 카드를 그려주는 함수
    function renderIngredients(data) {
        const display = document.getElementById('ingredient-display');
        display.innerHTML = '';

        if (data.length === 0) {
            display.innerHTML = '<div class="no-result">검색 결과가 없습니다. 다른 키워드로 검색해보세요!</div>';
            return;
        }

        data.forEach(ing => {
            // 추천/비추천 배지 생성
            let goodBadHTML = '';
            if (ing.goodFor.length > 0) {
                goodBadHTML += `<span class="badge good">👍 ${ing.goodFor.join(', ')} 추천</span>`;
            }
            if (ing.badFor.length > 0) {
                goodBadHTML += `<span class="badge bad">⚠️ ${ing.badFor.join(', ')} 주의</span>`;
            }

            display.innerHTML += `
                <div class="ing-card">
                    <div class="ing-header">
                        <span class="ing-title">${ing.name}</span>
                        <span class="ing-eng">${ing.eng}</span>
                    </div>
                    <p class="ing-desc">${ing.desc}</p>
                    <div class="badge-area">
                        ${goodBadHTML}
                    </div>
                </div>
            `;
        });
    }

    // 피부 타입 버튼 필터링 함수
    function setFilter(type, btnElement) {
        currentFilter = type;
        
        // 버튼 색상 변경
        const btns = document.querySelectorAll('.filter-btns button');
        btns.forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');

        filterIngredients();
    }

    // 검색창 & 필터 동시 적용 함수
    function filterIngredients() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        
        const filteredData = ingredientsData.filter(ing => {
            // 1. 검색어 검사 (이름, 영문명, 키워드에 포함되는지)
            const matchSearch = ing.name.includes(searchText) || 
                                ing.eng.toLowerCase().includes(searchText) || 
                                ing.keyword.includes(searchText);
            
            // 2. 피부 타입 필터 검사
            let matchFilter = true;
            if (currentFilter !== 'all') {
                // goodFor 배열 안에 현재 클릭한 필터(지성, 건성 등)가 포함되어 있는지 확인
                matchFilter = ing.goodFor.includes(currentFilter);
            }

            return matchSearch && matchFilter;
        });

        renderIngredients(filteredData);
    }

    // 페이지 로드 시 전체 데이터 처음 한 번 그려주기
    window.onload = function() {
        renderIngredients(ingredientsData);
    };
</script>

</body>
</html>
